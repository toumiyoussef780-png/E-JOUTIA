<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>E-JOUTIA • Marketplace</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">E</div>
      <div>
        <div class="brandName">E-JOUTIA</div>
        <div class="tagline">Marketplace • Maroc</div>
      </div>
    </div>

    <div class="actions">
      <button id="btnPublish" class="btn primary">Publier annonce</button>
      <button id="btnLogin" class="btn">Connexion</button>
      <button id="btnLogout" class="btn danger hidden">Déconnexion</button>
    </div>
  </header>

  <main class="container">
    <section class="filters">
      <input id="searchInput" type="search" placeholder="Rechercher (ex: iPhone, PS5…)" />
      <select id="categoryFilter">
        <option value="">Toutes catégories</option>
        <option>Electronique</option>
        <option>Maison</option>
        <option>Mode</option>
        <option>Auto</option>
        <option>Services</option>
        <option>Autre</option>
      </select>
      <select id="cityFilter">
        <option value="">Toutes villes</option>
        <option>Casablanca</option>
        <option>Rabat</option>
        <option>Marrakech</option>
        <option>Tanger</option>
        <option>Agadir</option>
        <option>Fès</option>
        <option>Autre</option>
      </select>
      <select id="sortSelect">
        <option value="new">Plus récent</option>
        <option value="price_asc">Prix ↑</option>
        <option value="price_desc">Prix ↓</option>
      </select>
    </section>

    <section class="meta">
      <div id="resultsCount" class="muted"></div>
      <div id="status" class="status hidden"></div>
    </section>

    <section id="productsGrid" class="grid"></section>

    <section id="emptyState" class="empty hidden">
      <h3>Aucune annonce pour le moment</h3>
      <p>Publie la première annonce et partage le lien ✨</p>
    </section>
  </main>

  <!-- AUTH MODAL -->
  <div id="authModal" class="modal hidden">
    <div class="modalCard">
      <div class="modalHead">
        <h3>Connexion / Inscription</h3>
        <button class="iconBtn" id="closeAuth">✕</button>
      </div>
      <div class="modalBody">
        <label>Email</label>
        <input id="authEmail" type="email" placeholder="email@example.com" />
        <label>Mot de passe</label>
        <input id="authPassword" type="password" placeholder="••••••••" />
        <div class="row">
          <button id="doLogin" class="btn primary">Connexion</button>
          <button id="doRegister" class="btn">Inscription</button>
        </div>
        <p class="muted small">Astuce: استعمل ايميل ديالك و باسورد قوي.</p>
      </div>
    </div>
  </div>

  <!-- PUBLISH MODAL -->
  <div id="publishModal" class="modal hidden">
    <div class="modalCard">
      <div class="modalHead">
        <h3>Publier une annonce</h3>
        <button class="iconBtn" id="closePublish">✕</button>
      </div>

      <form id="annonceForm" class="modalBody">
        <label>Titre</label>
        <input id="titre" required maxlength="80" placeholder="ex: iPhone 13 Pro" />

        <div class="row">
          <div class="col">
            <label>Prix (DH)</label>
            <input id="prix" required inputmode="decimal" placeholder="ex: 2500" />
          </div>
          <div class="col">
            <label>Catégorie</label>
            <select id="categorie" required>
              <option value="">Choisir…</option>
              <option>Electronique</option>
              <option>Maison</option>
              <option>Mode</option>
              <option>Auto</option>
              <option>Services</option>
              <option>Autre</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col">
            <label>Ville</label>
            <select id="ville" required>
              <option value="">Choisir…</option>
              <option>Casablanca</option>
              <option>Rabat</option>
              <option>Marrakech</option>
              <option>Tanger</option>
              <option>Agadir</option>
              <option>Fès</option>
              <option>Autre</option>
            </select>
          </div>
          <div class="col">
            <label>WhatsApp</label>
            <input id="whatsapp" placeholder="ex: 0666771366" />
          </div>
        </div>

        <label>Description</label>
        <textarea id="description" rows="4" maxlength="800" placeholder="وصف مختصر وواضح…"></textarea>

        <label>Photo (JPG/PNG/WebP)</label>
        <input id="image" type="file" accept="image/*" />
        <img id="imagePreview" class="preview hidden" alt="preview" />

        <button id="publishBtn" type="submit" class="btn primary full">Publier</button>
        <p class="muted small">ملاحظة: خاصك تكون مسجّل الدخول باش تنشر.</p>
      </form>
    </div>
  </div>

  <footer class="footer">
    <div>© <span id="year"></span> E-JOUTIA • Built with Firebase</div>
  </footer>

  <script type="module" src="./firebase.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
